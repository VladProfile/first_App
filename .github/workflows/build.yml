name: Android Build
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
    - name: Ultimate Find and Build
      run: |
        # Ищем build.gradle по всему репозиторию на любую глубину
        BUILD_FILE=$(find . -name "build.gradle" -o -name "build.gradle.kts" | head -n 1)
        if [ -z "$BUILD_FILE" ]; then
          echo "ОШИБКА: Файл build.gradle не найден! Проверь, загрузил ли ты его с ноутбука."
          exit 1
        fi
        
        # Переходим в папку, где нашелся build.gradle
        TARGET_DIR=$(dirname "$BUILD_FILE")
        echo "Проект обнаружен в папке: $TARGET_DIR"
        cd "$TARGET_DIR"
        
        # Если в этой папке нет settings.gradle, создадим пустой, чтобы Gradle не ругался
        if [ ! -f "settings.gradle" ] && [ ! -f "settings.gradle.kts" ]; then
          echo "Создаем временный settings.gradle"
          echo "include ':app'" > settings.gradle
        fi
        
        # Запускаем генерацию и сборку
        gradle wrapper
        chmod +x gradlew
        ./gradlew assembleDebug
        
        # Копируем готовый APK в общую папку для выгрузки
        mkdir -p $GITHUB_WORKSPACE/output_apk
        APK_PATH=$(find . -name "*.apk" | head -n 1)
        if [ -n "$APK_PATH" ]; then
          cp "$APK_PATH" $GITHUB_WORKSPACE/output_apk/app-debug.apk
        else
          echo "ОШИБКА: APK файл не скомпилировался."
          exit 1
        fi
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-app-apk
        path: output_apk/app-debug.apk
