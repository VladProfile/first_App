name: Android Build
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
    - name: Find and Build Project
      run: |
        # Этот шаг автоматически найдет папку, где лежит settings.gradle
        TARGET_DIR=$(find . -name "settings.gradle" -o -name "settings.gradle.kts" | head -n 1 | xargs dirname)
        if [ -z "$TARGET_DIR" ]; then
          echo "ОШИБКА: Файл settings.gradle не найден вообще ни в одной папке репозитория!"
          exit 1
        fi
        echo "Проект обнаружен в папке: $TARGET_DIR"
        cd "$TARGET_DIR"
        
        # Генерируем запускальщик и собираем APK
        gradle wrapper
        chmod +x gradlew
        ./gradlew assembleDebug
        
        # Переносим готовый APK в корень, чтобы его было легко выгрузить
        mkdir -p $GITHUB_WORKSPACE/output_apk
        cp $(find . -name "*.apk" | head -n 1) $GITHUB_WORKSPACE/output_apk/app-debug.apk
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-app-apk
        path: output_apk/app-debug.apk
